name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Build Android APK
        run: flet build apk --project "SparrowCalc" --org "com.godfamily.sparrowcalc" --product "GOD FAMILY Tool"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sparrow_Calc_APK
          path: build/apk/**/*.apk
